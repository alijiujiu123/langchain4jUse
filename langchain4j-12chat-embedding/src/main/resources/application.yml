server:
  port: 9012
  servlet:
    # 设置响应的字符编码，避免流式响应返回乱码
    encoding:
      charset: UTF-8
      force: true
      enabled: true

spring:
  application:
    name: langchain4j-11chat-functioncalling
  ai:
    alibaba:
      apiKey: ${DASHSCOPE_API_KEY}
      baseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
      # qwen-long 无法实现函数调用
      qwenTextEmbeddingModelName: text-embedding-v4

# 向量数据库配置
vector:
  qdrant:
    host: 127.0.0.1
    port: 6334
    collectionName: test-qdrant-collection