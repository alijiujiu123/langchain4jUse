<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>WGS-84 转 GCJ-02</title>
</head>
<body>
<button onclick="getLocation()">获取 GCJ-02 坐标</button>
<p id="result">等待定位...</p>

<script>
    const pi = 3.1415926535897932384626;
    const a = 6378245.0;
    const ee = 0.00669342162296594323;

    function transformLat(x, y) {
        let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y +
            0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
        ret += (20.0 * Math.sin(6.0 * x * pi) + 20.0 * Math.sin(2.0 * x * pi)) * 2.0 / 3.0;
        ret += (20.0 * Math.sin(y * pi) + 40.0 * Math.sin(y / 3.0 * pi)) * 2.0 / 3.0;
        ret += (160.0 * Math.sin(y / 12.0 * pi) + 320 * Math.sin(y * pi / 30.0)) * 2.0 / 3.0;
        return ret;
    }

    function transformLon(x, y) {
        let ret = 300.0 + x + 2.0 * y + 0.1 * x * x +
            0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
        ret += (20.0 * Math.sin(6.0 * x * pi) + 20.0 * Math.sin(2.0 * x * pi)) * 2.0 / 3.0;
        ret += (20.0 * Math.sin(x * pi) + 40.0 * Math.sin(x / 3.0 * pi)) * 2.0 / 3.0;
        ret += (150.0 * Math.sin(x / 12.0 * pi) + 300.0 * Math.sin(x / 30.0 * pi)) * 2.0 / 3.0;
        return ret;
    }

    function outOfChina(lat, lon) {
        return (lon < 72.004 || lon > 137.8347 || lat < 0.8293 || lat > 55.8271);
    }

    function wgs84ToGcj02(lat, lon) {
        if (outOfChina(lat, lon)) {
            return [lat, lon];
        }
        let dLat = transformLat(lon - 105.0, lat - 35.0);
        let dLon = transformLon(lon - 105.0, lat - 35.0);
        const radLat = lat / 180.0 * pi;
        let magic = Math.sin(radLat);
        magic = 1 - ee * magic * magic;
        const sqrtMagic = Math.sqrt(magic);
        dLat = (dLat * 180.0) / ((a * (1 - ee)) / (magic * sqrtMagic) * pi);
        dLon = (dLon * 180.0) / (a / sqrtMagic * Math.cos(radLat) * pi);
        const mgLat = lat + dLat;
        const mgLon = lon + dLon;
        return [mgLat, mgLon];
    }

    function getLocation() {
        if (!navigator.geolocation) {
            document.getElementById('result').textContent = '浏览器不支持定位';
            return;
        }

        navigator.geolocation.getCurrentPosition(function (position) {
            const wgsLat = position.coords.latitude;
            const wgsLon = position.coords.longitude;
            const [gcjLat, gcjLon] = wgs84ToGcj02(wgsLat, wgsLon);
            document.getElementById('result').textContent =
                `GCJ-02 坐标：纬度 ${gcjLat}，经度 ${gcjLon}`;
        }, function (error) {
            document.getElementById('result').textContent = '定位失败: ' + error.message;
        });
    }
</script>
</body>
</html>
